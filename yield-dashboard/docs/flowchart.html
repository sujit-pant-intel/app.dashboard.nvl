ecf0f1","family":"Consolas, monospace","size":26},"namelength":0},"hovertext":["\u003cb\u003edashboard.py  \u2014  Pipeline Tab\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eFramework:\u003c\u002fb\u003e Tkinter + ttk, dark theme\u003cbr\u003e\u003cb\u003eClass:\u003c\u002fb\u003e PipelineFrame (pipeline.py)\u003cbr\u003e\u003cb\u003eMixins:\u003c\u002fb\u003e OpenerServerMixin, PipelineUIMixin,\u003cbr\u003e&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;PipelineRunnerMixin, PipelineHtmlMixin\u003cbr\u003e\u003cbr\u003e\u003cb\u003eRequired inputs (green \u2605):\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Data CSVs (.csv \u002f .gz \u002f .zip \u002f .7z)\u003cbr\u003e&nbsp;\u2022 BinDefs \u002f TestProgram folder\u003cbr\u003e\u003cb\u003eAuto-populated:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Dashboard.html path &nbsp;\u2022 Output folder\u003cbr\u003e&nbsp;\u2022 AQUA server + report path\u003cbr\u003e&nbsp;\u2022 Product config JSON  &nbsp;\u2022 Run identifier\u003cbr\u003e\u003cbr\u003e\u003cb\u003eButtons:\u003c\u002fb\u003e Run | Load JSON | Save JSON | Open Dashboard | \u21ba Reset\u003cbr\u003e\u003cb\u003eLog panel:\u003c\u002fb\u003e live output with [total | \u0394section] timing\u003cbr\u003e\u003cb\u003eHTTP opener server:\u003c\u002fb\u003e localhost random port (JMP launch)","\u003cb\u003eyield_pipeline.py  \u2014  Headless CLI\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eUsage:\u003c\u002fb\u003e python yield_pipeline.py --input cfg.json\u003cbr\u003e\u003cb\u003eSame pipeline logic as GUI; no window required\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003e\u003cb\u003eSteps run:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;1. AQUA fetch (if configured)\u003cbr\u003e&nbsp;2. Parse BinDefs \u2192 CrystalBall CSV\u003cbr\u003e&nbsp;3. DD update (append cols B \u002f C)\u003cbr\u003e&nbsp;4. Full analysis run\u003cbr\u003e\u003cbr\u003e\u003cb\u003eUsed by:\u003c\u002fb\u003e auto_pull_and_run.py for automation\u003cbr\u003e\u003cb\u003eOutput:\u003c\u002fb\u003e same artifacts as GUI pipeline run","\u003cb\u003eauto_pull_and_run.py  \u2014  Full Automation\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eSteps:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;1. Pull AQUA data (NCXSDJXL0H61* lots)\u003cbr\u003e&nbsp;2. Change detection vs snapshot.json\u003cbr\u003e&nbsp;3. If changed \u2192 run yield_pipeline.py headless\u003cbr\u003e&nbsp;4. Publish results to SharePoint\u003cbr\u003e&nbsp;5. Send completion email\u003cbr\u003e\u003cbr\u003e\u003cb\u003eArgs:\u003c\u002fb\u003e --dry-run  --force  --days N\u003cbr\u003e\u003cb\u003eDefault lookback:\u003c\u002fb\u003e 7 days\u003cbr\u003e\u003cb\u003eTriggered by:\u003c\u002fb\u003e Windows Task Scheduler","\u003cb\u003eAQUA Server  \u2014  Manufacturing Data Source\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eAMR:\u003c\u002fb\u003e FMSAPP3301.amr.corp.intel.com\u003cbr\u003e\u003cb\u003eGAR:\u003c\u002fb\u003e PGSAPP3301.gar.corp.intel.com\u003cbr\u003e\u003cb\u003eClient:\u003c\u002fb\u003e AquaCmdLine.exe\u003cbr\u003e\u003cbr\u003e\u003cb\u003eArgs:\u003c\u002fb\u003e -aquaserver  -reportPath  -outputFilename\u003cbr\u003e\u003cb\u003eOutput:\u003c\u002fb\u003e raw lot \u002f wafer test CSV or .csv.gz\u003cbr\u003e\u003cbr\u003e\u003cb\u003eDefault lots:\u003c\u002fb\u003e NCXSDJXL0H61* (NVL sort)\u003cbr\u003e\u003cb\u003eLookback:\u003c\u002fb\u003e configurable (default 7 days)\u003cbr\u003e\u003cb\u003eOptional:\u003c\u002fb\u003e skipped if DataCSV provided directly","\u003cb\u003eData CSV  \u2014  Primary Input\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eFormats:\u003c\u002fb\u003e .csv  .csv.gz  .zip  .7z\u003cbr\u003e\u003cb\u003eMulti-CSV:\u003c\u002fb\u003e multiple files merged row-wise before processing\u003cbr\u003e\u003cbr\u003e\u003cb\u003eKey columns (auto-detected):\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 SORT_LOT \u002f Lot \u002f LOTFROMFS\u003cbr\u003e&nbsp;\u2022 SORT_WAFER \u002f Wafer_ID\u003cbr\u003e&nbsp;\u2022 INTERFACE_BIN_* (pass \u002f fail gate)\u003cbr\u003e&nbsp;\u2022 FUNCTIONAL_BIN_* (root cause bin)\u003cbr\u003e&nbsp;\u2022 Program Name \u002f ProgramName\u003cbr\u003e&nbsp;\u2022 LOTS End Date Time \u002f Start_Date_Time\u003cbr\u003e\u003cbr\u003e\u003cb\u003eDedup:\u003c\u002fb\u003e by lot + wafer + program after merge","\u003cb\u003eBinDefinitions  \u2014  Bin Spec\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eSource:\u003c\u002fb\u003e TestProgram folder\u003cbr\u003e\u003cb\u003eDefault path:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;I:\\program\\1001\\prod\\hdmtprogs\\nvl_ncx_sds\u003cbr\u003e\u003cbr\u003e\u003cb\u003eParsed by:\u003c\u002fb\u003e parse_bindef_to_crystalball.py\u003cbr\u003e\u003cb\u003eOutput:\u003c\u002fb\u003e *_crystalball.csv\u003cbr\u003e\u003cbr\u003e\u003cb\u003eMaps bin numbers to:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Bin names and descriptions\u003cbr\u003e&nbsp;\u2022 Pass \u002f fail classification\u003cbr\u003e&nbsp;\u2022 Functional vs Interface bin type\u003cbr\u003e\u003cb\u003eUsed by:\u003c\u002fb\u003e Steps 4 and 5 of pipeline","\u003cb\u003eProduct Config JSON  \u2014  Fail Bucket Definitions\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eLocations (priority order):\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 shared\u002fsetup\u002fconfig\u002fyield-dashboard\u002f\u003cbr\u003e&nbsp;\u2022 shared\u002fspec\u002fcollateral\u002fyield\u002f\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePurpose:\u003c\u002fb\u003e Groups functional bins into\u003cbr\u003ehigh-level failure buckets for Pareto analysis\u003cbr\u003e\u003cbr\u003e\u003cb\u003eExample buckets:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 SCAN \u002f DFT failures\u003cbr\u003e&nbsp;\u2022 MBIST \u002f memory failures\u003cbr\u003e&nbsp;\u2022 Analog \u002f IDDQ \u002f Leakage failures\u003cbr\u003e\u003cbr\u003e\u003cb\u003eDrives:\u003c\u002fb\u003e Step 5 DD Update + Pareto bucketing","\u003cb\u003eInput Config JSON  \u2014  Pipeline Config File\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eLoad via:\u003c\u002fb\u003e GUI \"Load JSON\" button or --input CLI arg\u003cbr\u003e\u003cb\u003eSave via:\u003c\u002fb\u003e GUI \"Save JSON\" button\u003cbr\u003e\u003cbr\u003e\u003cb\u003eKey fields:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 dashboard: path to Dashboard.html\u003cbr\u003e&nbsp;\u2022 output_folder: results root path\u003cbr\u003e&nbsp;\u2022 identifier: TP \u002f run label\u003cbr\u003e&nbsp;\u2022 DataCSV: single path or list of paths\u003cbr\u003e&nbsp;\u2022 aquaserver: \"AMR\" or \"GAR\"\u003cbr\u003e&nbsp;\u2022 reportPath: AQUA report identifier\u003cbr\u003e&nbsp;\u2022 TestProgram \u002f TestProgram_folder\u003cbr\u003e&nbsp;\u2022 product_config_json: bucket config path\u003cbr\u003e&nbsp;\u2022 sicc_run: true \u002f false\u003cbr\u003e\u003cbr\u003e\u003cb\u003eEnv override:\u003c\u002fb\u003e APP_YIELD_NVL_ROOT sets repo root","\u003cb\u003eStep 1:  AQUA Data Fetch  (Optional)\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eStatus:\u003c\u002fb\u003e Skipped if DataCSV is provided directly\u003cbr\u003e\u003cb\u003eClient:\u003c\u002fb\u003e AquaCmdLine.exe (Windows shell exec)\u003cbr\u003e\u003cb\u003eArgs:\u003c\u002fb\u003e -aquaserver  -reportPath  -outputFilename\u003cbr\u003e\u003cbr\u003e\u003cb\u003eOutput:\u003c\u002fb\u003e .csv or .csv.gz saved to output_folder\u003cbr\u003e\u003cb\u003eNon-zero return code:\u003c\u002fb\u003e pipeline aborts immediately\u003cbr\u003e\u003cb\u003eFile not found:\u003c\u002fb\u003e returns exit code 3\u003cbr\u003e\u003cbr\u003e\u003cb\u003eTiming:\u003c\u002fb\u003e logged as [total | \u0394] in output panel\u003cbr\u003e\u003cb\u003eOn success:\u003c\u002fb\u003e path forwarded to Step 2 merge","\u003cb\u003eStep 2:  Multi-CSV Merge\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eTriggered when:\u003c\u002fb\u003e DataCSV is a list (multiple files)\u003cbr\u003e\u003cb\u003eLibrary:\u003c\u002fb\u003e pandas concat (dtype=object, low_memory=False)\u003cbr\u003e\u003cbr\u003e\u003cb\u003eProcess:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;1. Read each file (.csv \u002f .gz \u002f .zip \u002f .7z)\u003cbr\u003e&nbsp;2. Concatenate row-wise\u003cbr\u003e&nbsp;3. Deduplicate by lot + wafer + program columns\u003cbr\u003e&nbsp;4. Write merged result to temp file\u003cbr\u003e\u003cbr\u003e\u003cb\u003eFirst CSV = primary\u003c\u002fb\u003e \u2014 sets column order\u003cbr\u003e\u003cb\u003eSingle CSV:\u003c\u002fb\u003e step is effectively a no-op passthrough","\u003cb\u003eStep 3:  Clean Output Subfolder\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003ePurpose:\u003c\u002fb\u003e Remove stale artifacts from prior runs\u003cbr\u003e\u003cb\u003eLibrary:\u003c\u002fb\u003e shutil.rmtree()\u003cbr\u003e\u003cbr\u003e\u003cb\u003eTarget path:\u003c\u002fb\u003e output_folder \u002f safe_identifier \u002f\u003cbr\u003e&nbsp;(safe_id = alphanumeric + [-_.]; other chars \u2192 _)\u003cbr\u003e\u003cbr\u003e\u003cb\u003eMulti-TP runs:\u003c\u002fb\u003e only the first TP name used for folder\u003cbr\u003e\u003cb\u003eFailure:\u003c\u002fb\u003e logs [warn] and continues \u2014 not fatal\u003cbr\u003e\u003cb\u003eAfter clean:\u003c\u002fb\u003e fresh empty subfolder ready for artifacts","\u003cb\u003eStep 4:  Parse BinDefinitions\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eScript:\u003c\u002fb\u003e parse_bindef_to_crystalball.py\u003cbr\u003e\u003cb\u003eDispatch:\u003c\u002fb\u003e via _loader.py (resolves .pyd modules)\u003cbr\u003e\u003cbr\u003e\u003cb\u003eInput:\u003c\u002fb\u003e .bdefs file (auto-located in TP folder)\u003cbr\u003e\u003cb\u003eOutput:\u003c\u002fb\u003e *_crystalball.csv in output subfolder\u003cbr\u003e\u003cbr\u003e\u003cb\u003eDev mode:\u003c\u002fb\u003e subprocess \u2192 _loader.py \u2192 script\u003cbr\u003e\u003cb\u003eFrozen mode:\u003c\u002fb\u003e imports compiled module directly\u003cbr\u003e\u003cbr\u003e\u003cb\u003eProvides:\u003c\u002fb\u003e bin number \u2192 name \u002f category mapping\u003cbr\u003e\u003cb\u003eRequired by:\u003c\u002fb\u003e Step 5 DD Update + all HTML generators","\u003cb\u003eStep 5:  Digital Dashboard Update\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eScript:\u003c\u002fb\u003e get_dd_update.py via _loader.py\u003cbr\u003e\u003cbr\u003e\u003cb\u003eInputs:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Data CSV (raw sort data from Steps 1\u20132)\u003cbr\u003e&nbsp;\u2022 CrystalBall CSV (from Step 4)\u003cbr\u003e&nbsp;\u2022 Dashboard.html (existing run index)\u003cbr\u003e&nbsp;\u2022 Product Config JSON (bucket definitions)\u003cbr\u003e\u003cbr\u003e\u003cb\u003eAppended columns to data CSV:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Column B = bin category name\u003cbr\u003e&nbsp;\u2022 Column C = fail bucket assignment\u003cbr\u003e\u003cbr\u003e\u003cb\u003eSide output:\u003c\u002fb\u003e digital_dashboard.html\u003cbr\u003e&nbsp;bin-category breakdown table with interactive JS rows","\u003cb\u003eStep 6:  Main Analysis Pipeline\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eOrchestrator:\u003c\u002fb\u003e PipelineRunnerMixin (_pipeline_runner.py)\u003cbr\u003e\u003cb\u003eExecution:\u003c\u002fb\u003e background thread (GUI stays live)\u003cbr\u003e\u003cb\u003eOutput queue:\u003c\u002fb\u003e log lines streamed to GUI panel\u003cbr\u003e&nbsp;polled every 200 ms via tk.after()\u003cbr\u003e\u003cbr\u003e\u003cb\u003eDispatches to all processing modules:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 bin_distribution_html.py\u003cbr\u003e&nbsp;\u2022 generate_bin_wafer_heatmaps.py\u003cbr\u003e&nbsp;\u2022 _pipeline_html.py (pareto + master HTML)\u003cbr\u003e&nbsp;\u2022 sort-parametric\u002f runner\u003cbr\u003e&nbsp;\u2022 SICC UPM \u002f SICC CDYN (if sicc_run=True)\u003cbr\u003e\u003cbr\u003e\u003cb\u003eTiming:\u003c\u002fb\u003e [total elapsed | \u0394 since last section] per step\u003cbr\u003e\u003cb\u003eOn complete:\u003c\u002fb\u003e Dashboard.html updated, report opened","\u003cb\u003ebin_distribution_html.py  \u2014  Bin Distribution\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eInputs:\u003c\u002fb\u003e enriched data CSV (with cols B \u002f C) + bindef CSV\u003cbr\u003e\u003cbr\u003e\u003cb\u003eAnalysis:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Per-lot and per-wafer bin counts\u003cbr\u003e&nbsp;\u2022 INTERFACE_BIN_* pass \u002f fail gate breakdown\u003cbr\u003e&nbsp;\u2022 FUNCTIONAL_BIN_* root cause distribution\u003cbr\u003e&nbsp;\u2022 Sorted by fail rate, color-coded by severity\u003cbr\u003e\u003cbr\u003e\u003cb\u003eOutput:\u003c\u002fb\u003e *_BinDistribution.html\u003cbr\u003e\u003cb\u003eEmbedded in output:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Top-10 pareto chart (from _pipeline_html.py)\u003cbr\u003e&nbsp;\u2022 Digital dashboard section (from get_dd_update)\u003cbr\u003e&nbsp;\u2022 Links to wafermap.html per lot (fbTileClick JS)","\u003cb\u003egenerate_bin_wafer_heatmaps.py  \u2014  Wafer Heatmaps\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003ePurpose:\u003c\u002fb\u003e Spatial die-level wafer heatmaps per IBIN\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePer lot, per IBIN bin:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Die X \u002f Y coordinates \u2192 2D wafer grid\u003cbr\u003e&nbsp;\u2022 Color = IBIN bin category\u003cbr\u003e&nbsp;\u2022 One standalone HTML per lot\u003cbr\u003e\u003cbr\u003e\u003cb\u003eOutput:\u003c\u002fb\u003e heatmap\u002f*_IBIN_WaferMap_LOT.html\u003cbr\u003e&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;+ combined wafermap.html index\u003cbr\u003e\u003cbr\u003e\u003cb\u003eLot column priority:\u003c\u002fb\u003e SORT_LOT \u2192 lot \u2192 *lot* (not *slot*)\u003cbr\u003e\u003cb\u003eJS navigation:\u003c\u002fb\u003e fbTileClick() \u2192 per-lot file + #wafer-W anchor\u003cbr\u003e\u003cb\u003ePer-lot URL map:\u003c\u002fb\u003e _wm_files_dict{lot \u2192 html path}","\u003cb\u003e_pipeline_html.py  \u2014  PipelineHtmlMixin\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eMethods:\u003c\u002fb\u003e _build_pareto_html, _build_master_html,\u003cbr\u003e&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;_update_dashboard_html\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePareto filter:\u003c\u002fb\u003e FUNCTIONAL_BIN_* rows where\u003cbr\u003e&nbsp;&nbsp;INTERFACE_BIN_* \u003e 4  (fail gate was crossed)\u003cbr\u003e\u003cbr\u003e\u003cb\u003eLibraries:\u003c\u002fb\u003e matplotlib (Agg backend), pandas, numpy\u003cbr\u003e\u003cb\u003eChart:\u003c\u002fb\u003e matplotlib figure \u2192 base64 PNG \u2192 embedded in HTML\u003cbr\u003e\u003cbr\u003e\u003cb\u003eGenerates:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Top-10 fail pareto bar chart\u003cbr\u003e&nbsp;\u2022 Pareto table injected into BinDistribution HTML\u003cbr\u003e&nbsp;\u2022 pareto_heatmap.html (standalone)\u003cbr\u003e&nbsp;\u2022 Master Dashboard HTML section (_build_master_html)\u003cbr\u003e&nbsp;\u2022 Dashboard.html updated (_update_dashboard_html)","\u003cb\u003esort-parametric\u002f  \u2014  Parametric Analysis Module\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eFiles:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 parametric_runner.py  \u2014 orchestrator\u003cbr\u003e&nbsp;\u2022 parametric_html.py   \u2014 HTML report generator\u003cbr\u003e&nbsp;\u2022 pcmprog_html.py      \u2014 PCM program HTML\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePurpose:\u003c\u002fb\u003e Analyze continuous parametric measurements\u003cbr\u003efrom sort test program execution\u003cbr\u003e\u003cbr\u003e\u003cb\u003eFeatures:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Distribution plots per parameter group\u003cbr\u003e&nbsp;\u2022 Pass \u002f fail summary by parameter\u003cbr\u003e&nbsp;\u2022 Driven by PCM Setup JSON pattern definitions\u003cbr\u003e\u003cbr\u003e\u003cb\u003eOutput:\u003c\u002fb\u003e parametric HTML files in per-run subfolder","\u003cb\u003eSICC Analysis Modules\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eEnabled when:\u003c\u002fb\u003e sicc_run = True in Input Config JSON\u003cbr\u003e\u003cbr\u003e\u003cb\u003eSICC UPM:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;sicc_upm\u002fsrc\u002frun_dashboard.py\u003cbr\u003e&nbsp;Unit Power Management analysis\u003cbr\u003e\u003cbr\u003e\u003cb\u003eSICC CDYN UPM:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;sicc_cdyn_upm\u002fsrc\u002frun_dashboard.py\u003cbr\u003e&nbsp;Dynamic Capacitance analysis\u003cbr\u003e\u003cbr\u003e\u003cb\u003eExecution:\u003c\u002fb\u003e separate subprocess launched by Step 6\u003cbr\u003e\u003cb\u003ePath:\u003c\u002fb\u003e resolved from _ROOT_DIR constant\u003cbr\u003e\u003cb\u003eOutput:\u003c\u002fb\u003e separate SICC HTML dashboards in run subfolder","\u003cb\u003eDashboard.html  \u2014  Master Run Index\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eRole:\u003c\u002fb\u003e Central hub linking all pipeline run reports\u003cbr\u003e\u003cb\u003eUpdated by:\u003c\u002fb\u003e _update_dashboard_html() after every run\u003cbr\u003e\u003cbr\u003e\u003cb\u003eEach run row contains:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Run identifier \u002f test program label\u003cbr\u003e&nbsp;\u2022 Run timestamp\u003cbr\u003e&nbsp;\u2022 Overall yield % summary\u003cbr\u003e&nbsp;\u2022 Hyperlink \u2192 BinDistribution.html\u003cbr\u003e&nbsp;\u2022 Lot count \u002f wafer count\u003cbr\u003e\u003cbr\u003e\u003cb\u003eManaged by:\u003c\u002fb\u003e ManageFrame (reorder \u002f delete runs)\u003cbr\u003e\u003cb\u003eRead by:\u003c\u002fb\u003e yield_report.py, trend_chart.py for trending\u003cbr\u003e\u003cb\u003eServed by:\u003c\u002fb\u003e local HTTP server + SharePoint upload","\u003cb\u003eBinDistribution HTML  \u2014  Primary Run Artifact\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eLinked from:\u003c\u002fb\u003e Dashboard.html per-run row\u003cbr\u003e\u003cbr\u003e\u003cb\u003eSections:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Bin distribution table (sortable columns)\u003cbr\u003e&nbsp;\u2022 Interface bin pass \u002f fail counts per lot\u003cbr\u003e&nbsp;\u2022 Functional bin root cause breakdown\u003cbr\u003e&nbsp;\u2022 Top-10 fail pareto chart (embedded base64 PNG)\u003cbr\u003e&nbsp;\u2022 Digital dashboard section (DD HTML embed)\u003cbr\u003e&nbsp;\u2022 Links to wafermap.html per lot (fbTileClick JS)\u003cbr\u003e&nbsp;\u2022 Lot \u002f wafer summary statistics table\u003cbr\u003e\u003cbr\u003e\u003cb\u003eWatermark:\u003c\u002fb\u003e \"Pant, Sujit N \u2014 GEMS FTE\"\u003cbr\u003e&nbsp;fixed-position div injected by WM_HTML constant","\u003cb\u003eWafer Map HTML  \u2014  Spatial Die Heatmaps\u003c\u002fb\u003e\u003cbr\u003e\u003cb\u003eLocation:\u003c\u002fb\u003e heatmap\u002f subfolder within run folder\u003cbr\u003e\u003cb\u003eNaming:\u003c\u002fb\u003e stem_IBIN_WaferMap_LOT.html\u003cbr\u003e\u003cbr\u003e\u003cb\u003eOne file per lot\u003c\u002fb\u003e + combined wafermap.html index\u003cbr\u003e\u003cbr\u003e\u003cb\u003eAuto-detected:\u003c\u002fb\u003e _wm_url set to \"wafermap.html\" if\u003cbr\u003e&nbsp;heatmap\u002f*.html exists in output subfolder\u003cbr\u003e\u003cbr\u003e\u003cb\u003eCross-links:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Linked from Pareto + BinDistribution pages\u003cbr\u003e&nbsp;\u2022 fbTileClick navigates with #wafer-W anchor\u003cbr\u003e\u003cb\u003ePer-lot map:\u003c\u002fb\u003e _wm_files_dict built from SORT_LOT column","\u003cb\u003ePareto Heatmap  +  Digital Dashboard\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003e\u003cb\u003epareto_heatmap.html:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Standalone top-N fail pareto report\u003cbr\u003e&nbsp;\u2022 Ranked fail bar chart + color heat table\u003cbr\u003e&nbsp;\u2022 matplotlib figure \u2192 base64 PNG embedded\u003cbr\u003e&nbsp;\u2022 Filter: FUNCTIONAL_BIN_* where IBIN \u003e 4\u003cbr\u003e\u003cbr\u003e\u003cb\u003edigital_dashboard.html:\u003c\u002fb\u003e\u003cbr\u003e&nbsp;\u2022 Bin-category breakdown (get_dd_update output)\u003cbr\u003e&nbsp;\u2022 Column B = bin category name\u003cbr\u003e&nbsp;\u2022 Column C = fail bucket assignment\u003cbr\u003e&nbsp;\u2022 Digital \u002f A     var connected = {};
    connected[nodeId] = true;
    (adj[nodeId] || []).forEach(function(nid) { connected[nid] = true; });

    var shapeUpdates = {};
    DATA.nodes.forEach(function(n) {
      var si = n.shapeIdx;
      if (connected[n.id]) {
        /* highlighted: original colour + bright white border glow */
        shapeUpdates['shapes[' + si + '].fillcolor']   = n.origFill;
        shapeUpdates['shapes[' + si + '].line.color']  = '#ffffff';
        shapeUpdates['shapes[' + si + '].line.width']  = 3.5;
        shapeUpdates['shapes[' + si + '].opacity']     = 1.0;
      } else {
        /* dimmed */
        shapeUpdates['shapes[' + si + '].fillcolor']   = '#0d1b24';
        shapeUpdates['shapes[' + si + '].line.color']  = '#1e2e3d';
        shapeUpdates['shapes[' + si + '].line.width']  = 1.0;
        shapeUpdates['shapes[' + si + '].opacity']     = 0.25;
      }
    });
    Plotly.relayout(DIV, shapeUpdates);

    /* Split edges into connected / disconnected groups, then batch restyle */
    var connEdges = [], dimEdges = [];
    DATA.edges.forEach(function(e) {
      if (e.srcId === nodeId || e.dstId === nodeId) {
        connEdges.push(e.traceIdx);
      } else {
        dimEdges.push(e.traceIdx);
      }
    });
    if (connEdges.length)
      Plotly.restyle(DIV, {'line.color': '#ffffff', opacity: 1.0}, connEdges);
    if (dimEdges.length)
      Plotly.restyle(DIV, {'line.color': '#0d1b24', opacity: 0.05}, dimEdges);
  }

  /* ── Wire up Plotly events after DOM ready ───────────────────────────── */
  function wireEvents() {
    var el = document.getElementById(DIV);
    if (!el || !el.on) {
      setTimeout(wireEvents, 150);
      return;
    }

    el.on('plotly_click', function(data) {
      var pt = data.points[0];
      /* only react to clicks on the invisible node scatter */
      if (pt.data.name !== '_nodes') return;
      var nodeIdx = pt.customdata;
      var nodeId  = DATA.nodes[nodeIdx].id;
      if (highlighted === nodeId) {
        resetAll();          /* click same node again → reset */
      } else {
        highlightNode(nodeId);
      }
    });

    el.on('plotly_doubleclick', function() {
      resetAll();
    });

    /* click on empty plot area → reset */
    el.addEventListener('click', function(evt) {
      /* Plotly fires plotly_click for point clicks; a raw click that
         did NOT produce a plotly_click means the background was clicked */
    });
  }
  wireEvents();
})();
</script>

<script>
  /* full-window resize */
  (function(){
    function resize(){
      Plotly.relayout('chart',{width:window.innerWidth,height:window.innerHeight});
    }
    window.addEventListener('resize', resize);
    var t=setInterval(function(){
      if(document.getElementById('chart')&&window.Plotly){resize();clearInterval(t);}
    },100);
  })();
</script>
